<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JB AKUN - Pure Deep Blue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* PIUR BIRU AGAK GELAP */
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            background-attachment: fixed;
            color: #f1f5f9;
            min-height: 100vh;
        }

        .glass { 
            background: rgba(30, 58, 138, 0.2); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(56, 189, 248, 0.15); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* LOGO STYLE JB AKUN */
        .logo-text { font-size: 2.2rem; font-weight: 800; letter-spacing: -2px; }
        .logo-blue { color: #38bdf8; filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.4)); }

        .nav-active { color: #38bdf8; position: relative; }
        .nav-active::after { 
            content: ''; position: absolute; bottom: -8px; width: 25px; height: 3px; 
            background: #38bdf8; border-radius: 10px; box-shadow: 0 0 15px #38bdf8;
        }

        .grad-blue { background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%); }
        .grad-sold { background: linear-gradient(135deg, #0369a1 0%, #0ea5e9 100%); }
        
        input, select { 
            background: rgba(15, 23, 42, 0.6) !important; 
            border: 1px solid rgba(56, 189, 248, 0.2) !important; 
            color: #f1f5f9 !important;
        }
        input:focus { border-color: #38bdf8 !important; outline: none; }

        #sellModal, #detailModal { display: none; }
        #sellModal.active, #detailModal.active { display: flex; animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="pb-32">

    <div class="p-8 pt-12 flex justify-between items-center">
        <div>
            <div class="logo-text">
                <span class="logo-blue">JB</span>
                <span class="text-white font-light uppercase">AKUN</span>
            </div>
            <p id="liveClock" class="text-[10px] font-bold text-blue-400/50 uppercase tracking-[0.2em] mt-1"></p>
        </div>
        <div class="h-12 w-12 rounded-2xl glass flex items-center justify-center">
            <i class="fas fa-layer-group text-blue-400"></i>
        </div>
    </div>

    <div class="px-6 space-y-6">
        <div id="home" class="tab-content active space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-[2rem]">
                    <p class="text-[10px] text-blue-300 font-bold uppercase opacity-60">Modal Stock</p>
                    <h3 id="totalModal" class="text-lg font-bold text-white mt-1">0</h3>
                </div>
                <div class="glass p-5 rounded-[2rem]">
                    <p class="text-[10px] text-blue-300 font-bold uppercase opacity-60">Operasional</p>
                    <h3 id="totalPengeluaran" class="text-lg font-bold text-blue-400 mt-1">0</h3>
                </div>
            </div>

            <div class="grad-blue p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden border border-white/10">
                <p class="text-blue-100/70 text-[10px] font-bold uppercase tracking-widest">Total Net Profit</p>
                <h2 id="homeTotalProfit" class="text-4xl font-extrabold mt-1 text-white tracking-tight">Rp 0</h2>
                <div class="mt-8 flex items-center text-[9px] font-bold uppercase tracking-tighter text-blue-200">
                    <span class="px-3 py-1 bg-black/20 rounded-lg mr-2 border border-white/5">Profit Tracker On</span>
                    <i class="fas fa-shield-alt text-blue-300"></i>
                </div>
                <i class="fas fa-chart-pie absolute -right-6 -bottom-6 text-9xl text-white/5"></i>
            </div>

            <div class="glass p-6 rounded-[2.5rem]">
                <p class="text-[10px] font-bold text-blue-400 uppercase mb-4 tracking-widest">Growth Performance</p>
                <div class="h-[180px]"><canvas id="mountainChart"></canvas></div>
            </div>
        </div>

        <div id="input" class="tab-content">
            <div class="glass p-8 rounded-[2.5rem]">
                <div class="flex p-1.5 bg-black/30 rounded-2xl mb-8 border border-white/5">
                    <button onclick="setInputType('akun')" id="typeAkun" class="flex-1 py-3 rounded-xl text-[11px] font-bold grad-blue text-white">STOK</button>
                    <button onclick="setInputType('biaya')" id="typeBiaya" class="flex-1 py-3 rounded-xl text-[11px] font-bold text-blue-400/50">BIAYA</button>
                </div>

                <form id="stockForm" class="space-y-4">
                    <div id="akunFields" class="space-y-4">
                        <input type="text" id="nama" class="w-full px-6 py-4 rounded-2xl text-sm" placeholder="Nama Akun">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="email" class="w-full px-6 py-4 rounded-2xl text-sm" placeholder="User">
                            <input type="text" id="pass" class="w-full px-6 py-4 rounded-2xl text-sm" placeholder="Pass">
                        </div>
                        <select id="loginType" class="w-full px-6 py-4 rounded-2xl text-sm font-bold">
                            <option value="Google">Google / Gmail</option>
                            <option value="FB">Facebook</option>
                            <option value="Moonton">Moonton</option>
                            <option value="VK">VK Account</option>
                        </select>
                        <input type="number" id="beli" class="w-full px-6 py-4 rounded-2xl font-bold text-blue-400 text-sm" placeholder="Harga Modal">
                    </div>

                    <div id="biayaFields" class="space-y-4 hidden">
                        <input type="text" id="namaBiaya" class="w-full px-6 py-4 rounded-2xl text-sm" placeholder="Keterangan">
                        <input type="number" id="jumlahBiaya" class="w-full px-6 py-4 rounded-2xl font-bold text-red-400 text-sm" placeholder="Jumlah (Rp)">
                    </div>

                    <button type="submit" class="w-full py-5 rounded-2xl grad-blue text-white font-black text-xs uppercase tracking-widest shadow-xl">SIMPAN DATA</button>
                </form>
            </div>
        </div>

        <div id="stok" class="tab-content space-y-6">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl font-bold text-white tracking-tighter">Inventory</h2>
                <span id="countStok" class="text-[10px] font-bold text-blue-400 px-3 py-1 glass rounded-full">0 UNITS</span>
            </div>
            <div id="stokContainer" class="space-y-4"></div>
        </div>

        <div id="rekap" class="tab-content space-y-6">
            <div class="glass rounded-[2.5rem] overflow-hidden">
                <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                    <h2 class="font-bold text-white italic">History</h2>
                    <button onclick="resetData()" class="text-blue-400 text-[10px] font-bold uppercase">Clear All</button>
                </div>
                <div id="rekapContainer" class="divide-y divide-white/5 max-h-[450px] overflow-y-auto px-4"></div>
            </div>
        </div>
    </div>

    <div id="sellModal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md items-center justify-center p-6">
        <div class="glass w-full max-sm rounded-[2.5rem] p-8">
            <h3 class="text-xl font-bold text-white mb-6 italic">Input Harga Jual</h3>
            <input type="number" id="inputHargaJual" class="w-full px-6 py-4 rounded-2xl font-bold text-blue-400 text-2xl mb-8" placeholder="Rp 0">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="py-4 rounded-2xl bg-white/5 font-bold text-xs uppercase text-gray-400">Cancel</button>
                <button id="confirmSellBtn" class="py-4 rounded-2xl grad-sold text-white font-black text-xs uppercase shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md items-center justify-center p-6">
        <div class="glass w-full max-sm rounded-[2.5rem] p-8 border border-white/10">
            <h3 class="text-xl font-bold text-white mb-6">Credential Details</h3>
            <div class="space-y-4">
                <div class="p-4 rounded-2xl bg-black/40 border border-white/5">
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1 tracking-widest">User / Email</p>
                    <p id="detEmail" class="text-white font-bold break-all"></p>
                </div>
                <div class="p-4 rounded-2xl bg-black/40 border border-white/5">
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1 tracking-widest">Password</p>
                    <p id="detPass" class="text-white font-bold break-all"></p>
                </div>
                <button onclick="closeDetail()" class="w-full py-4 rounded-2xl bg-white/10 text-white font-black text-xs uppercase mt-4">Tutup</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-8 left-6 right-6 h-20 glass rounded-[2.2rem] flex justify-around items-center px-4 z-50 border border-white/10 shadow-2xl">
        <button onclick="switchTab('home')" id="btn-home" class="flex flex-col items-center nav-active">
            <i class="fas fa-home-alt text-lg"></i><span class="text-[8px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="switchTab('input')" id="btn-input" class="flex flex-col items-center text-blue-400/30">
            <i class="fas fa-plus-circle text-lg"></i><span class="text-[8px] mt-1 font-bold">INPUT</span>
        </button>
        <button onclick="switchTab('stok')" id="btn-stok" class="flex flex-col items-center text-blue-400/30">
            <i class="fas fa-wallet text-lg"></i><span class="text-[8px] mt-1 font-bold">STOK</span>
        </button>
        <button onclick="switchTab('rekap')" id="btn-rekap" class="flex flex-col items-center text-blue-400/30">
            <i class="fas fa-receipt text-lg"></i><span class="text-[8px] mt-1 font-bold">REKAP</span>
        </button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('profitEL_V9')) || [];
        const ctx = document.getElementById('mountainChart').getContext('2d');
        let chart, currentSellIndex = null, currentInputType = 'akun';

        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerHTML = now.toLocaleTimeString('id-ID') + ' • ' + now.toLocaleDateString('id-ID');
        }, 1000);

        function initChart() {
            const grad = ctx.createLinearGradient(0, 0, 0, 180);
            grad.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
            grad.addColorStop(1, 'rgba(56, 189, 248, 0)');
            
            chart = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: ['Start', 'Monitoring'], 
                    datasets: [{ 
                        data: [0, 0], 
                        borderColor: '#38bdf8', 
                        backgroundColor: grad, 
                        fill: true, 
                        tension: 0.4, 
                        borderWidth: 3, 
                        pointRadius: 0 
                    }] 
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function setInputType(type) {
            currentInputType = type;
            const btnAkun = document.getElementById('typeAkun');
            const btnBiaya = document.getElementById('typeBiaya');
            if(type === 'akun') {
                btnAkun.className = 'flex-1 py-3 rounded-xl text-[11px] font-bold grad-blue text-white shadow-lg';
                btnBiaya.className = 'flex-1 py-3 rounded-xl text-[11px] font-bold text-blue-400/30';
                document.getElementById('akunFields').classList.remove('hidden');
                document.getElementById('biayaFields').classList.add('hidden');
            } else {
                btnBiaya.className = 'flex-1 py-3 rounded-xl text-[11px] font-bold grad-blue text-white shadow-lg';
                btnAkun.className = 'flex-1 py-3 rounded-xl text-[11px] font-bold text-blue-400/30';
                document.getElementById('biayaFields').classList.remove('hidden');
                document.getElementById('akunFields').classList.add('hidden');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('nav button').forEach(btn => { btn.classList.remove('nav-active'); btn.classList.add('text-blue-400/30'); });
            document.getElementById('btn-' + tabId).classList.remove('text-blue-400/30');
            document.getElementById('btn-' + tabId).classList.add('nav-active');
        }

        function updateUI() {
            const stokC = document.getElementById('stokContainer');
            const rekapC = document.getElementById('rekapContainer');
            stokC.innerHTML = ''; rekapC.innerHTML = '';
            let totalProfitAkun = 0, totalModalSold = 0, totalBiayaLain = 0, countStok = 0;
            let chartData = [0]; let chartLabels = ['Start'];

            db.forEach((item, index) => {
                if(item.type === 'akun' && item.status === 'ready') {
                    countStok++;
                    stokC.innerHTML += `
                        <div class="glass p-6 rounded-[2rem] flex justify-between items-center border border-white/5">
                            <div onclick="openDetail(${index})" class="cursor-pointer">
                                <h4 class="font-bold text-white text-sm uppercase italic">${item.nama}</h4>
                                <span class="text-[8px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-md font-bold uppercase mt-1 inline-block">${item.login}</span>
                            </div>
                            <button onclick="openSellModal(${index})" class="px-6 h-10 rounded-xl grad-sold text-white text-[10px] font-black uppercase tracking-widest shadow-lg">JUAL</button>
                        </div>`;
                } else if (item.type === 'akun' && item.status === 'sold') {
                    const profit = item.jual - item.beli;
                    totalProfitAkun += profit;
                    totalModalSold += parseInt(item.beli);
                    chartData.push(totalProfitAkun - totalBiayaLain);
                    chartLabels.push(item.timeOnly);
                    rekapC.innerHTML += `<div class="py-5 flex justify-between items-center"><div><p class="font-bold text-white text-xs uppercase">${item.nama}</p><p class="text-[8px] text-blue-400/30 mt-1 uppercase">${item.dateFull} • ${item.timeOnly}</p></div><div class="text-right font-black text-blue-400 text-sm">+Rp ${profit.toLocaleString()}</div></div>`;
                } else if (item.type === 'biaya') {
                    totalBiayaLain += parseInt(item.jumlah);
                    chartData.push(totalProfitAkun - totalBiayaLain);
                    chartLabels.push(item.timeOnly);
                    rekapC.innerHTML += `<div class="py-5 flex justify-between items-center"><div><p class="font-bold text-blue-300/60 text-xs uppercase">${item.nama}</p><p class="text-[8px] text-blue-400/30 mt-1 uppercase">${item.dateFull}</p></div><div class="text-right font-black text-red-500 text-sm">-Rp ${parseInt(item.jumlah).toLocaleString()}</div></div>`;
                }
            });

            document.getElementById('homeTotalProfit').innerText = `Rp ${(totalProfitAkun - totalBiayaLain).toLocaleString()}`;
            document.getElementById('totalModal').innerText = `Rp ${totalModalSold.toLocaleString()}`;
            document.getElementById('totalPengeluaran').innerText = `Rp ${totalBiayaLain.toLocaleString()}`;
            document.getElementById('countStok').innerText = countStok + " UNITS";
            if(chart) {
                chart.data.labels = chartLabels.length > 1 ? chartLabels : ['Start', 'Monitoring'];
                chart.data.datasets[0].data = chartData.length > 1 ? chartData : [0, 0];
                chart.update();
            }
        }

        function openSellModal(index) { currentSellIndex = index; document.getElementById('inputHargaJual').value = ''; document.getElementById('sellModal').classList.add('active'); }
        function closeModal() { document.getElementById('sellModal').classList.remove('active'); }
        function openDetail(index) { document.getElementById('detEmail').innerText = db[index].email || '-'; document.getElementById('detPass').innerText = db[index].pass || '-'; document.getElementById('detailModal').classList.add('active'); }
        function closeDetail() { document.getElementById('detailModal').classList.remove('active'); }
        function save() { localStorage.setItem('profitEL_V9', JSON.stringify(db)); }

        document.getElementById('confirmSellBtn').addEventListener('click', () => {
            const hrg = document.getElementById('inputHargaJual').value;
            if (hrg) {
                const now = new Date();
                db[currentSellIndex].jual = parseInt(hrg);
                db[currentSellIndex].status = 'sold';
                db[currentSellIndex].dateFull = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
                db[currentSellIndex].timeOnly = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                save(); updateUI(); closeModal(); switchTab('home');
            }
        });

        document.getElementById('stockForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const now = new Date();
            if(currentInputType === 'akun') {
                db.push({ type: 'akun', nama: document.getElementById('nama').value, login: document.getElementById('loginType').value, email: document.getElementById('email').value, pass: document.getElementById('pass').value, beli: document.getElementById('beli').value, status: 'ready' });
            } else {
                db.push({ type: 'biaya', nama: document.getElementById('namaBiaya').value, jumlah: document.getElementById('jumlahBiaya').value, dateFull: now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' }), timeOnly: now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) });
            }
            save(); updateUI(); e.target.reset();
            currentInputType === 'akun' ? switchTab('stok') : switchTab('home');
        });

        function resetData() { if(confirm('Hapus semua history rekap?')) { db = db.filter(i => i.status === 'ready'); save(); updateUI(); } }

        initChart();
        updateUI();
    </script>
</body>
</html>
